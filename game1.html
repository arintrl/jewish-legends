<!DOCTYPE html>
<html>
<head>
<title>Money Empire</title>
<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #111, #000);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
    transition: transform 0.05s ease;
}

#container {
    padding-top: 40px;
}

#moneyDisplay {
    font-size: 80px;
    font-weight: bold;
    text-shadow: 0 0 25px gold;
}

#stats {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.8;
}

button {
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

#clickBtn {
    margin-top: 40px;
    font-size: 40px;
    padding: 30px 80px;
    background: linear-gradient(45deg, gold, orange);
    box-shadow: 0 0 30px gold;
    transition: transform 0.1s ease;
}

#clickBtn:active {
    transform: scale(0.92);
}

#rebirthBtn {
    margin-top: 30px;
    font-size: 22px;
    padding: 15px 40px;
    background: crimson;
    color: white;
    opacity: 0.5;
    transition: 0.2s;
}

#rebirthBtn.enabled {
    opacity: 1;
    box-shadow: 0 0 20px crimson;
}

#hubBtn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 30px;
    background: #444;
    color: white;
}

.floating {
    position: absolute;
    font-weight: bold;
    color: lime;
    animation: floatUp 1s forwards;
    pointer-events: none;
}

@keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-80px); }
}

.flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0.6;
    animation: flashAnim 0.3s forwards;
}

@keyframes flashAnim {
    0% { opacity: 0.6; }
    100% { opacity: 0; }
}
</style>
</head>

<body>

<div id="container">
    <div id="moneyDisplay">$0</div>
    <div id="stats">
        Rebirths: <span id="rebirthCount">0</span> |
        Multiplier: <span id="multiplierDisplay">1x</span>
    </div>

    <button id="clickBtn">💰 CLICK FOR MONEY 💰</button>
    <br>
    <button id="rebirthBtn">Rebirth</button>
</div>

<button id="hubBtn" onclick="location.href='index.html'">Back To Hub</button>

<script>
let money = 0;
let rebirths = 0;

loadGame();
updateUI();

const clickBtn = document.getElementById("clickBtn");
const rebirthBtn = document.getElementById("rebirthBtn");

clickBtn.addEventListener("click", function(event) {
    const gain = calculateGain();
    money += gain;

    tinyShake();
    createFloatingText(event.clientX, event.clientY, "+" + formatNumber(gain));

    saveGame();
    updateUI();
});

rebirthBtn.addEventListener("click", function() {
    if (money >= getRebirthCost()) {
        money = 0;
        rebirths++;

        bigShake();
        screenFlash();

        saveGame();
        updateUI();
    }
});

function calculateGain() {
    const base = 1 + rebirths;
    const multiplier = 1 + (rebirths * 0.05);
    return Math.floor(base * multiplier);
}

function getRebirthCost() {
    return Math.floor(500000 * Math.pow(1.5, rebirths));
}

function updateUI() {
    document.getElementById("moneyDisplay").innerText = "$" + formatNumber(money);
    document.getElementById("rebirthCount").innerText = rebirths;
    document.getElementById("multiplierDisplay").innerText = (1 + (rebirths * 0.05)).toFixed(2) + "x";

    if (money >= getRebirthCost()) {
        rebirthBtn.classList.add("enabled");
        rebirthBtn.innerText = "Rebirth (" + formatNumber(getRebirthCost()) + ")";
    } else {
        rebirthBtn.classList.remove("enabled");
        rebirthBtn.innerText = "Rebirth (" + formatNumber(getRebirthCost()) + ")";
    }
}

function tinyShake() {
    document.body.style.transform = "translate(3px, -3px)";
    setTimeout(() => {
        document.body.style.transform = "translate(0,0)";
    }, 50);
}

function bigShake() {
    document.body.style.transform = "translate(8px, -8px)";
    setTimeout(() => {
        document.body.style.transform = "translate(0,0)";
    }, 150);
}

function screenFlash() {
    const flash = document.createElement("div");
    flash.className = "flash";
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 300);
}

function createFloatingText(x, y, text) {
    const float = document.createElement("div");
    float.className = "floating";
    float.innerText = text;
    float.style.left = x + "px";
    float.style.top = y + "px";
    document.body.appendChild(float);

    setTimeout(() => float.remove(), 1000);
}

function formatNumber(num) {
    return num.toLocaleString();
}

function saveGame() {
    localStorage.setItem("money", money);
    localStorage.setItem("rebirths", rebirths);
}

function loadGame() {
    const savedMoney = localStorage.getItem("money");
    const savedRebirths = localStorage.getItem("rebirths");

    if (savedMoney !== null) money = parseInt(savedMoney);
    if (savedRebirths !== null) rebirths = parseInt(savedRebirths);
}
</script>

</body>
</html>
