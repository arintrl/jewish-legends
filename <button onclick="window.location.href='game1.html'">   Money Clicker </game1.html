<!DOCTYPE html>
<html>
<head>
<title>Money Clicker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  background: linear-gradient(135deg,#111,#1e1e1e);
  color:white;
  text-align:center;
  font-family:Arial;
}

h1{
  margin-top:40px;
  font-size:40px;
}

#money{
  font-size:30px;
  margin:20px;
}

button{
  font-size:25px;
  padding:15px 35px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:gold;
  margin:10px;
  transition:0.2s;
}

button:hover{
  transform:scale(1.1);
}

#upgrade{
  background:limegreen;
}

a{
  display:block;
  margin-top:40px;
  color:white;
  text-decoration:none;
}
</style>
</head>
<body>

<h1>💰 Money Clicker</h1>

<div id="money">Money: 0</div>

<button onclick="addMoney()">Click Me!</button>
<br>
<button id="upgrade" onclick="buyUpgrade()">Buy +5 Upgrade ($50)</button>

<a href="index.html">⬅ Back to Hub</a>

<script>
let money = 0;
let power = 1;

function addMoney(){
  money += power;
  document.getElementById("money").innerText = "Money: " + money;
}

function buyUpgrade(){
  if(money >= 50){
    money -= 50;
    power += 5;
    document.getElementById("money").innerText = "Money: " + money;
    alert("Upgrade bought! You now earn +" + power + " per click!");
  } else {
    alert("Not enough money!");
  }
}
</script>

</body>
</html>
